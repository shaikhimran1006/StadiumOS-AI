# ============================================================================
# StadiumOS AI - Google Cloud Build Configuration
# ============================================================================

substitutions:
  _REGION: us-central1
  _REPOSITORY: stadiumos
  _PROJECT_ID: stadiumos-ai-prod

steps:
  # --------------------------------------------------------------------------
  # Step 1: Build and push backend image
  # --------------------------------------------------------------------------
  - name: gcr.io/cloud-builders/docker
    id: build-backend
    args:
      - build
      - --cache-from
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/backend:latest
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/backend:${COMMIT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/backend:latest
      - -f
      - backend/Dockerfile
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - .

  # --------------------------------------------------------------------------
  # Step 2: Build and push frontend image
  # --------------------------------------------------------------------------
  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    args:
      - build
      - --cache-from
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/frontend:latest
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/frontend:${COMMIT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/frontend:latest
      - -f
      - frontend/Dockerfile
      - --build-arg
      - BUILDKIT_INLINE_CACHE=1
      - --build-arg
      - NODE_ENV=production
      - .

  # --------------------------------------------------------------------------
  # Step 3: Push backend image to Artifact Registry
  # --------------------------------------------------------------------------
  - name: gcr.io/cloud-builders/docker
    id: push-backend
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/backend

  # --------------------------------------------------------------------------
  # Step 4: Push frontend image to Artifact Registry
  # --------------------------------------------------------------------------
  - name: gcr.io/cloud-builders/docker
    id: push-frontend
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/frontend

  # --------------------------------------------------------------------------
  # Step 5: Deploy backend to Cloud Run
  # --------------------------------------------------------------------------
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-backend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - stadiumos-backend
      - --image
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/backend:${COMMIT_SHA}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --service-account
      - stadiumos-backend@${_PROJECT_ID}.iam.gserviceaccount.com
      - --memory
      - 2Gi
      - --cpu
      - 2
      - --min-instances
      - "1"
      - --max-instances
      - "20"
      - --concurrency
      - "80"
      - --timeout
      - "300"
      - --set-env-vars
      - ENVIRONMENT=production,GOOGLE_CLOUD_PROJECT=${_PROJECT_ID}
      - --allow-unauthenticated
      - --no-use-http2

  # --------------------------------------------------------------------------
  # Step 6: Deploy frontend to Cloud Run
  # --------------------------------------------------------------------------
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-frontend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - stadiumos-frontend
      - --image
      - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/frontend:${COMMIT_SHA}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --service-account
      - stadiumos-frontend@${_PROJECT_ID}.iam.gserviceaccount.com
      - --memory
      - 256Mi
      - --cpu
      - "1"
      - --min-instances
      - "1"
      - --max-instances
      - "10"
      - --concurrency
      - "80"
      - --timeout
      - "60"
      - --allow-unauthenticated
      - --no-use-http2

images:
  - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/backend:${COMMIT_SHA}
  - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/backend:latest
  - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/frontend:${COMMIT_SHA}
  - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/frontend:latest

timeout: 1200s
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
