[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

asyncio_mode = auto

addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:cacheprovider

markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may need Firestore emulator)
    ai: AI agent tests (mocked Vertex AI)
    slow: Slow tests
    security: Security-related tests

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
